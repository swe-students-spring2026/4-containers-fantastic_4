services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ml-client:
    build: ./machine-learning-client
    ports:
      - "5001:5001"
    env_file:
      - machine-learning-client/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/
    depends_on:
      - mongodb

  web-app:
    build: ./web-app
    ports:
      - "5002:5000"
    env_file:
      - web-app/.env
    environment:
      - ML_CLIENT_URL=http://ml-client:5001
      - MONGO_URI=mongodb://mongodb:27017/
    depends_on:
      - mongodb
      - ml-client

volumes:
  mongo_data:
